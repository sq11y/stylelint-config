name: "Release NPM package"

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  version-bump:
    name: "Look for a version bump"
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check.outputs.changed }}
    steps:
      - name: "Checkout"
        uses: actions/checkout@v6
      - name: "Look for a version bump"
        id: check
        uses: EndBug/version-check@v3

  release:
    environment: npm
    name: "Release stylelint-config-sq11y"
    runs-on: ubuntu-latest
    needs: [version-bump]
    if: needs.version-bump.outputs.changed == 'true'
    steps:
      - name: "Checkout"
        uses: actions/checkout@v6
      - name: "Setup pnpm"
        uses: pnpm/action-setup@v4
      - name: "Setup Node"
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - name: "Install dependencies"
        run: pnpm install --frozen-lockfile
      - name: "Publish to NPM"
        run: pnpm publish --access public
